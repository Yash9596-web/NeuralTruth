name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 09_code/backend/requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
          pip install pytest httpx python-multipart

      - name: Run Tests
        run: |
          pytest tests/test_api.py

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: '09_code/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: 09_code/frontend
        run: npm install

      - name: Build for Cloudflare (validates full build)
        working-directory: 09_code/frontend
        run: npx opennextjs-cloudflare build
