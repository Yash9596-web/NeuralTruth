name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.1.0 --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r apps/backend/requirements.txt
          pip install pytest httpx python-multipart

      - name: Run Tests
        run: |
          pytest tests/test_api.py

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'apps/frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd apps/frontend
          npm ci

      - name: Lint
        run: |
          cd apps/frontend
          npx next lint

      - name: Build Next.js
        run: |
          cd apps/frontend
          npm run build
